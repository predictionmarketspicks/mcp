name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t pmp-mcp-shim .
      - run: docker run --rm --entrypoint sh pmp-mcp-shim -c "mcp-remote --version || which mcp-remote"
