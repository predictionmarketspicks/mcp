name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run smoke
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t pmp-mcp-quant .
      # Run the stdio smoke test inside the built image — proves the server
      # starts and answers tools/list + tools/call end-to-end.
      - run: docker run --rm pmp-mcp-quant node scripts/smoke.js
